<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG 登录 - TelegramForwarder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 240px;
            background: #161b22;
            border-right: 1px solid #30363d;
            padding: 24px 0;
        }
        .sidebar .brand {
            padding: 0 24px 24px;
            font-size: 18px;
            font-weight: 700;
            color: #58a6ff;
            border-bottom: 1px solid #30363d;
            margin-bottom: 16px;
        }
        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 24px;
            color: #8b949e;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.15s;
        }
        .sidebar nav a:hover, .sidebar nav a.active { color: #f0f6fc; background: rgba(88,166,255,0.1); }
        .sidebar nav a .icon { font-size: 18px; width: 24px; text-align: center; }
        .main { margin-left: 240px; padding: 32px 40px; }
        .main h2 { font-size: 22px; margin-bottom: 8px; color: #f0f6fc; }
        .main .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 24px; }

        .step-indicator {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
        }
        .step {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            font-size: 13px;
            color: #484f58;
        }
        .step.active { border-color: #58a6ff; color: #58a6ff; }
        .step.done { border-color: #3fb950; color: #3fb950; }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 32px;
            max-width: 560px;
        }
        .card h3 { font-size: 16px; margin-bottom: 20px; color: #f0f6fc; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            color: #8b949e;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #c9d1d9;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus { border-color: #58a6ff; }
        .form-group .hint { font-size: 12px; color: #484f58; margin-top: 6px; }
        .btn {
            padding: 10px 24px;
            background: #238636;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { background: #2ea043; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline {
            background: transparent;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }
        .btn-outline:hover { background: #21262d; }
        .btn-danger { background: #da3633; }
        .btn-danger:hover { background: #f85149; }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }
        .alert.show { display: block; }
        .alert-error { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); color: #f85149; }
        .alert-success { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); color: #3fb950; }
        .alert-info { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.3); color: #58a6ff; }
        .mt-16 { margin-top: 16px; }
        .flex-row { display: flex; gap: 12px; align-items: center; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">📨 TF Manager</div>
        <nav>
            <a href="/admin/dashboard"><span class="icon">🏠</span> 控制台</a>
            <a href="/admin/setup" class="active"><span class="icon">🔑</span> TG 登录</a>
            <a href="/admin/proxy"><span class="icon">🌐</span> 代理设置</a>
            <a href="#" onclick="logout(); return false" style="margin-top:32px;color:#f85149;"><span class="icon">🚪</span> 退出登录</a>
        </nav>
    </div>
    <div class="main">
        <h2>🔑 Telegram 账号登录</h2>
        <p class="subtitle">配置 API 凭据并完成 Telegram 账号登录</p>

        <div class="step-indicator">
            <div class="step active" id="step1">① 填写凭据</div>
            <div class="step" id="step2">② 输入验证码</div>
            <div class="step" id="step3">③ 完成</div>
        </div>

        <!-- Step 1: 凭据 -->
        <div class="card" id="cardCredentials">
            <h3>📝 Telegram API 凭据</h3>
            <div class="form-group">
                <label>API ID</label>
                <input type="text" id="apiId" placeholder="从 my.telegram.org/apps 获取">
                <div class="hint">访问 <a href="https://my.telegram.org/apps" target="_blank" style="color:#58a6ff">my.telegram.org</a> 创建应用获取</div>
            </div>
            <div class="form-group">
                <label>API Hash</label>
                <input type="text" id="apiHash" placeholder="32位字符串">
            </div>
            <div class="form-group">
                <label>手机号</label>
                <input type="text" id="phone" placeholder="+8613800138000">
                <div class="hint">国际格式，带 + 号和国家代码</div>
            </div>
            <button class="btn" id="btnInit" onclick="initLogin()">发送验证码</button>
            <div class="alert" id="alertCredentials"></div>
        </div>

        <!-- Step 2: 验证码 -->
        <div class="card" id="cardCode" style="display:none">
            <h3>📱 输入验证码</h3>
            <p style="color:#8b949e;font-size:14px;margin-bottom:16px">
                验证码已发送到 <strong id="phoneDisplay"></strong>，请查收 Telegram 消息
            </p>
            <div class="form-group">
                <label>验证码</label>
                <input type="text" id="code" placeholder="5位数字" maxlength="5" autofocus>
            </div>
            <button class="btn" id="btnCode" onclick="verifyCode()">验证</button>
            <div class="alert" id="alertCode"></div>
        </div>

        <!-- Step 2b: 两步验证密码 -->
        <div class="card" id="cardPassword" style="display:none">
            <h3>🔒 两步验证</h3>
            <p style="color:#8b949e;font-size:14px;margin-bottom:16px">
                此账号启用了两步验证，请输入密码
            </p>
            <div class="form-group">
                <label>两步验证密码</label>
                <input type="password" id="twofaPassword" placeholder="输入您的两步验证密码">
            </div>
            <button class="btn" id="btnPassword" onclick="verifyPassword()">确认</button>
            <div class="alert" id="alertPassword"></div>
        </div>

        <!-- Step 3: 完成 -->
        <div class="card" id="cardDone" style="display:none">
            <h3>✅ 登录成功</h3>
            <p style="color:#3fb950;font-size:14px;margin-bottom:16px">
                Telegram 账号已成功登录！现在可以正常使用转发功能了。
            </p>
            <div class="flex-row">
                <a href="/admin/dashboard" class="btn">返回控制台</a>
                <button class="btn btn-danger" onclick="logoutTG()">登出 TG</button>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;

        function showAlert(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'alert alert-' + type + ' show';
        }
        function hideAlert(id) {
            document.getElementById(id).classList.remove('show');
        }

        function setStep(n) {
            currentStep = n;
            ['step1','step2','step3'].forEach((s,i) => {
                const el = document.getElementById(s);
                el.className = 'step';
                if (i+1 < n) el.classList.add('done');
                if (i+1 === n) el.classList.add('active');
            });
        }

        async function initLogin() {
            const btn = document.getElementById('btnInit');
            btn.disabled = true;
            btn.textContent = '发送中...';
            hideAlert('alertCredentials');

            const apiId = document.getElementById('apiId').value.trim();
            const apiHash = document.getElementById('apiHash').value.trim();
            const phone = document.getElementById('phone').value.trim();

            if (!apiId || !apiHash || !phone) {
                showAlert('alertCredentials', '请填写所有字段', 'error');
                btn.disabled = false;
                btn.textContent = '发送验证码';
                return;
            }

            try {
                const res = await fetch('/api/tg/init', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ api_id: apiId, api_hash: apiHash, phone: phone })
                });
                const data = await res.json();

                if (data.ok) {
                    if (data.step === 'done') {
                        setStep(3);
                        showDone();
                    } else {
                        setStep(2);
                        document.getElementById('cardCredentials').style.display = 'none';
                        document.getElementById('cardCode').style.display = 'block';
                        document.getElementById('phoneDisplay').textContent = phone;
                        document.getElementById('code').focus();
                        showAlert('alertCode', data.message, 'success');
                    }
                } else {
                    showAlert('alertCredentials', data.error, 'error');
                }
            } catch (e) {
                showAlert('alertCredentials', '网络错误: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '发送验证码';
            }
        }

        async function verifyCode() {
            const btn = document.getElementById('btnCode');
            btn.disabled = true;
            btn.textContent = '验证中...';
            hideAlert('alertCode');

            const code = document.getElementById('code').value.trim();
            if (!code) {
                showAlert('alertCode', '请输入验证码', 'error');
                btn.disabled = false;
                btn.textContent = '验证';
                return;
            }

            try {
                const res = await fetch('/api/tg/verify-code', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ code: code })
                });
                const data = await res.json();

                if (data.ok) {
                    if (data.step === 'done') {
                        setStep(3);
                        document.getElementById('cardCode').style.display = 'none';
                        showDone();
                    } else if (data.step === 'wait_password') {
                        document.getElementById('cardCode').style.display = 'none';
                        document.getElementById('cardPassword').style.display = 'block';
                        document.getElementById('twofaPassword').focus();
                    }
                } else {
                    showAlert('alertCode', data.error, 'error');
                }
            } catch (e) {
                showAlert('alertCode', '网络错误: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '验证';
            }
        }

        async function verifyPassword() {
            const btn = document.getElementById('btnPassword');
            btn.disabled = true;
            btn.textContent = '验证中...';
            hideAlert('alertPassword');

            const password = document.getElementById('twofaPassword').value.trim();
            if (!password) {
                showAlert('alertPassword', '请输入密码', 'error');
                btn.disabled = false;
                btn.textContent = '确认';
                return;
            }

            try {
                const res = await fetch('/api/tg/verify-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ password: password })
                });
                const data = await res.json();

                if (data.ok) {
                    setStep(3);
                    document.getElementById('cardPassword').style.display = 'none';
                    showDone();
                } else {
                    showAlert('alertPassword', data.error, 'error');
                }
            } catch (e) {
                showAlert('alertPassword', '网络错误: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '确认';
            }
        }

        function showDone() {
            document.getElementById('cardDone').style.display = 'block';
        }

        async function logoutTG() {
            if (!confirm('确定要登出 Telegram 账号吗？')) return;
            try {
                const res = await fetch('/api/tg/logout', { method: 'POST' });
                const data = await res.json();
                if (data.ok) {
                    window.location.reload();
                }
            } catch (e) {
                alert('登出失败: ' + e.message);
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/admin';
        }

        // 加载当前状态
        (async () => {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                if (data.step === 'done') {
                    setStep(3);
                    document.getElementById('cardCredentials').style.display = 'none';
                    showDone();
                }
            } catch (e) {}
        })();
    </script>
</body>
</html>
