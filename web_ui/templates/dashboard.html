<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelegramForwarder - 控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 240px;
            background: #161b22;
            border-right: 1px solid #30363d;
            padding: 24px 0;
        }
        .sidebar .brand {
            padding: 0 24px 24px;
            font-size: 18px;
            font-weight: 700;
            color: #58a6ff;
            border-bottom: 1px solid #30363d;
            margin-bottom: 16px;
        }
        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 24px;
            color: #8b949e;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.15s;
        }
        .sidebar nav a:hover, .sidebar nav a.active {
            color: #f0f6fc;
            background: rgba(88,166,255,0.1);
        }
        .sidebar nav a .icon { font-size: 18px; width: 24px; text-align: center; }
        .main {
            margin-left: 240px;
            padding: 32px 40px;
        }
        .main h2 {
            font-size: 22px;
            margin-bottom: 24px;
            color: #f0f6fc;
        }
        .status-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .status-card h3 { font-size: 16px; margin-bottom: 16px; color: #f0f6fc; }
        .status-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            font-size: 14px;
        }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #3fb950;
        }
        .status-dot.off { background: #f85149; }
        .status-dot.warn { background: #d29922; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-green { background: rgba(63,185,80,0.15); color: #3fb950; }
        .badge-red { background: rgba(248,81,73,0.15); color: #f85149; }
        .badge-yellow { background: rgba(210,153,34,0.15); color: #d29922; }
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .action-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: #c9d1d9;
            transition: border-color 0.15s;
        }
        .action-card:hover { border-color: #58a6ff; }
        .action-card .icon { font-size: 28px; margin-bottom: 12px; }
        .action-card h4 { font-size: 15px; margin-bottom: 6px; color: #f0f6fc; }
        .action-card p { font-size: 13px; color: #8b949e; }
        .btn-sm {
            padding: 6px 16px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-sm:hover { background: #30363d; }
        .btn-sm.danger { color: #f85149; border-color: #f85149; }
        .btn-sm.danger:hover { background: rgba(248,81,73,0.1); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">📨 TF Manager</div>
        <nav>
            <a href="/admin/dashboard" class="active">
                <span class="icon">🏠</span> 控制台
            </a>
            <a href="/admin/setup">
                <span class="icon">🔑</span> TG 登录
            </a>
            <a href="/admin/proxy">
                <span class="icon">🌐</span> 代理设置
            </a>
            <a href="#" onclick="logout(); return false" style="margin-top: 32px; color: #f85149;">
                <span class="icon">🚪</span> 退出登录
            </a>
        </nav>
    </div>
    <div class="main">
        <h2>📊 控制台</h2>

        <div class="status-card">
            <h3>🤖 Telegram 连接状态</h3>
            <div id="tgStatus">
                <div class="status-row">
                    <span>状态：</span>
                    <span class="status-dot off" id="statusDot"></span>
                    <span id="statusText">加载中...</span>
                </div>
                <div class="status-row" id="phoneRow" style="display:none">
                    <span>账号：</span>
                    <span id="phoneText"></span>
                </div>
                <div class="status-row" id="proxyRow" style="display:none">
                    <span>代理：</span>
                    <span id="proxyText"></span>
                </div>
            </div>
        </div>

        <h3 style="margin-bottom:16px">⚡ 快捷操作</h3>
        <div class="quick-actions">
            <a href="/admin/setup" class="action-card">
                <div class="icon">🔑</div>
                <h4>TG 账号登录</h4>
                <p>配置 API 凭据并登录 Telegram</p>
            </a>
            <a href="/admin/proxy" class="action-card">
                <div class="icon">🌐</div>
                <h4>代理设置</h4>
                <p>配置 SOCKS5/HTTP 代理</p>
            </a>
            <div class="action-card">
                <div class="icon">📋</div>
                <h4>查看日志</h4>
                <p>检查转发和运行日志</p>
            </div>
            <div class="action-card">
                <div class="icon">📖</div>
                <h4>使用文档</h4>
                <p>查看 Telegram 机器人命令</p>
            </div>
        </div>
    </div>

    <script>
        async function loadStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');

                if (data.step === 'done') {
                    dot.className = 'status-dot';
                    text.innerHTML = '<span class="badge badge-green">已连接</span>';
                    document.getElementById('phoneRow').style.display = 'flex';
                    document.getElementById('phoneText').textContent = data.phone || '-';
                } else if (data.step === 'idle') {
                    dot.className = 'status-dot off';
                    text.innerHTML = '<span class="badge badge-red">未登录</span>';
                } else {
                    dot.className = 'status-dot warn';
                    text.innerHTML = '<span class="badge badge-yellow">' + data.step + '</span>';
                }

                if (data.proxy_enabled) {
                    document.getElementById('proxyRow').style.display = 'flex';
                    document.getElementById('proxyText').textContent =
                        data.proxy_type + '://' + data.proxy_host + ':' + data.proxy_port;
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/admin';
        }

        loadStatus();
        setInterval(loadStatus, 10000);
    </script>
</body>
</html>
