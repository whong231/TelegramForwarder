<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelegramForwarder - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 48px;
            width: 400px;
            max-width: 90vw;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
        }
        .logo p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-top: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #0088cc;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #0088cc;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #006da3; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error {
            color: #ff4757;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>📨 TelegramForwarder</h1>
            <p>管理后台</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>管理密码</label>
                <input type="password" id="password" placeholder="请输入管理密码" autofocus>
            </div>
            <button type="submit" class="btn" id="loginBtn">登 录</button>
            <div class="error" id="errorMsg"></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = '登录中...';
            error.classList.remove('show');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: document.getElementById('password').value })
                });
                const data = await res.json();
                if (data.ok) {
                    window.location.href = '/admin/dashboard';
                } else {
                    error.textContent = data.error || '密码错误';
                    error.classList.add('show');
                }
            } catch (err) {
                error.textContent = '网络错误';
                error.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>
